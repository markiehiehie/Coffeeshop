<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Waffee Café</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; overflow:hidden; }
    .splash-bg { position:fixed; inset:0; background: radial-gradient(ellipse 70% 60% at 50% 50%, rgba(232,162,52,0.1) 0%, transparent 70%), radial-gradient(ellipse 40% 30% at 80% 20%, rgba(196,84,26,0.07) 0%, transparent 60%); }
    .splash-ring { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none; }
    .splash-ring::before { content:''; width:min(500px,90vw); height:min(500px,90vw); border:1px solid rgba(232,162,52,0.12); border-radius:50%; }
    .splash { text-align:center; position:relative; z-index:1; padding:2rem; }
    .splash-eyebrow { font-size:0.68rem; letter-spacing:0.4em; text-transform:uppercase; color:var(--amber); margin-bottom:2rem; opacity:0; animation:fadeUp 0.8s 0.2s ease forwards; }
    .splash-logo { font-family:'Playfair Display',serif; font-size:clamp(4rem,15vw,9rem); font-weight:900; color:var(--cream); line-height:0.9; opacity:0; animation:fadeUp 0.8s 0.4s ease forwards; }
    .splash-logo em { display:block; color:var(--amber); font-style:italic; font-weight:400; font-size:0.45em; letter-spacing:0.1em; }
    .splash-tagline { margin:2rem auto 0.5rem; font-family:'Playfair Display',serif; font-style:italic; font-size:clamp(1rem,3vw,1.4rem); color:var(--muted); opacity:0; animation:fadeUp 0.8s 0.6s ease forwards; }
    .splash-desc { color:var(--muted); font-size:0.88rem; max-width:320px; margin:0 auto 2.5rem; opacity:0; animation:fadeUp 0.8s 0.7s ease forwards; }
    .splash-btn { opacity:0; animation:fadeUp 0.8s 0.9s ease forwards; }
    .splash-hours { margin-top:2rem; font-size:0.72rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); opacity:0; animation:fadeUp 0.8s 1.1s ease forwards; }
    .splash-hours span { color:var(--amber); }
  </style>
</head>
<body>
  <div class="splash-bg"></div>
  <div class="splash-ring"></div>
  <div class="splash">
    <div class="splash-eyebrow">Malabon City, Philippines</div>
    <div class="splash-logo">Waffee<em>Café</em></div>
    <p class="splash-tagline">"Your Night Starts Here"</p>
    <p class="splash-desc">Indulge your senses in the cozy ambiance and irresistible aromas of The Waffee.</p>
    <div class="splash-btn"><a href="index.html" class="btn btn-solid">Enter Café</a></div>
    <div class="splash-hours">Open <span>5:00 PM – 12:00 MN</span> daily</div>
  </div>
</body>
</html>
